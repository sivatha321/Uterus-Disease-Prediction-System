<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

<style>

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:white;
    }

    .container {
        width: 400px;
        background: white;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    .error-box {
        background: #ffe5e5;
        color: #d8000c;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
    }

    .error-box ul {
        margin-left: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 15px;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 8px;
        background: #667eea;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #4f63d6;
    }

    .login-link {
        text-align: center;
        margin-top: 15px;
    }

    .login-link a {
        text-decoration: none;
        color: #667eea;
        font-weight: bold;
    }

</style>

</head>

<body>

<div class="container">

    <h2>Create Account</h2>

    {% if form.errors %}
    <div class="error-box">

        <ul>

            {% for field in form %}
                {% for error in field.errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            {% endfor %}

            {% for error in form.non_field_errors %}
                <li>{{ error }}</li>
            {% endfor %}

        </ul>

    </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               value="{{ form.username.value|default:'' }}">

        <input type="email"
               name="email"
               placeholder="Email Address"
               value="{{ form.email.value|default:'' }}">

        <input type="password"
               name="password"
               placeholder="Password">

        <input type="password"
               name="confirm_password"
               placeholder="Confirm Password">

        <button type="submit">
            Register
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/">Login</a>
    </div>

</div>

</body>

</html>
