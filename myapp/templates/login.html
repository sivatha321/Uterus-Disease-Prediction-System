<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:white;
    }

    .container{
        width:380px;
        background:white;
        padding:35px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    h2{
        text-align:center;
        color:#333;
        margin-bottom:25px;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:15px;
    }

    button{
        width:100%;
        padding:12px;
        background:#667eea;
        color:white;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-size:16px;
        margin-top:10px;
    }

    .success{
        background-color:#d4edda;
        color:#155724;
        padding:10px;
        margin-bottom:15px;
        border-radius:5px;
        text-align:center;
        font-weight:bold;
    }

    .error{
        background-color:#f8d7da;
        color:#721c24;
        padding:10px;
        margin-bottom:10px;
        border-radius:5px;
    }


    button:hover{
        background:#4f63d6;
    }

    .register-link{
        text-align:center;
        margin-top:15px;
    }

    .register-link a{
        text-decoration:none;
        color:#667eea;
        font-weight:bold;
    }

    .error-message{
        background:#ffe5e5;
        color:#d8000c;
        padding:10px;
        border-radius:8px;
        margin-bottom:15px;
        text-align:center;
    }

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

{% if messages %}
    {% for message in messages %}
        <div class="{{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="username"
        placeholder="Enter Username"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Enter Password"
        required
    >

    <button type="submit">
        Login
    </button>

</form>

<div class="register-link">
    Don't have an account?
    <a href="/register/">Register</a>
</div>

</div>

</body>
</html>
